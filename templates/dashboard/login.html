<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Reedah's Scent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jost', sans-serif; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#1c1712] text-[#f3ead9] px-6">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <p class="font-serif text-3xl tracking-wide">REEDAH'S <span class="italic font-normal">Scent</span></p>
            <p class="text-xs uppercase tracking-[0.3em] text-[#c8a97e] mt-2">Admin Access</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-900/40 border border-red-400/40 text-red-200 px-4 py-2 rounded mb-4 text-sm text-center">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs uppercase tracking-widest text-[#c8a97e] mb-1">Username</label>
                <input type="text" name="username" required autofocus class="w-full bg-transparent border border-white/20 rounded px-4 py-2.5 focus:outline-none focus:border-[#c8a97e] transition">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-[#c8a97e] mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-transparent border border-white/20 rounded px-4 py-2.5 focus:outline-none focus:border-[#c8a97e] transition">
            </div>
            <button type="submit" class="w-full bg-[#c8a97e] text-[#1c1712] px-6 py-3 uppercase tracking-widest text-sm font-medium hover:bg-[#f3ead9] transition mt-2">Login</button>
        </form>
    </div>
</body>
</html>
